name: color_watch
description: Watches a light's color via camera, alerts on change, and streams video + status to a second phone over the local network (no internet needed).
publish_to: "none"
version: 1.2.0+3

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.11.0
  flutter_local_notifications: ^17.2.3
  audioplayers: ^6.1.0
  flutter_foreground_task: ^8.10.0
  shelf: ^1.4.1
  http: ^1.2.2
  network_info_plus: ^6.1.1
  image: ^4.3.0
  flutter_overlay_window: ^0.5.0

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/alarm.mp3
    - assets/viewer.html
