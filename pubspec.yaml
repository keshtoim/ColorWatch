name: color_watch
description: Watches a light's color via camera, alerts on change, and streams video + status to a second phone over the local network (no internet needed).
publish_to: "none"
version: 1.5.0+6

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.11.0
  flutter_local_notifications: ^17.2.3
  audioplayers: ^6.1.0
  # Pinned: the caret range let pub resolve 8.17.0+, which dropped the
  # `serviceTypes` startService arg and changed TaskHandler.onDestroy, breaking
  # the build. Pin to 8.17.0 so the API the code targets stays put. The camera
  # foreground-service type is declared in overrides/AndroidManifest.xml.
  flutter_foreground_task: 8.17.0
  shelf: ^1.4.1
  http: ^1.2.2
  network_info_plus: ^6.1.1
  image: ^4.3.0
  flutter_overlay_window: ^0.5.0

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/alarm.mp3
    - assets/viewer.html

# App launcher icon. Source image lives at assets/icon.png (a square PNG,
# ideally 1024x1024). The CI build runs flutter_launcher_icons after generating
# the android/ scaffolding; it overwrites the default Flutter mipmaps that the
# manifest references via @mipmap/ic_launcher.
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  min_sdk_android: 21
