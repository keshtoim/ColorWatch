name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Show Flutter version
        run: flutter --version

      # Back up our custom pubspec/lib so flutter create can't overwrite them.
      - name: Back up sources
        run: |
          cp pubspec.yaml /tmp/pubspec.yaml
          cp -r lib /tmp/lib
          cp -r assets /tmp/assets

      # Generate fresh android/ scaffolding matching this Flutter version.
      - name: Create platform scaffolding
        run: flutter create --platforms=android --org com.example .

      # Restore our sources (in case flutter create touched them).
      - name: Restore sources
        run: |
          cp /tmp/pubspec.yaml pubspec.yaml
          rm -rf lib && cp -r /tmp/lib lib
          rm -rf assets && cp -r /tmp/assets assets

      # Apply custom manifest (camera + notifications + foreground service).
      - name: Apply custom manifest
        run: cp overrides/AndroidManifest.xml android/app/src/main/AndroidManifest.xml

      # Camera plugin + foreground service need minSdk 21+.
      - name: Patch SDK versions
        run: |
          # minSdk 21 → runs on Android 5+ (incl. Android 10).
          sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 21/' android/app/build.gradle.kts || true
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/' android/app/build.gradle || true
          # targetSdk 34 → runs fine on Android 16 while avoiding the stricter
          # Android 15+ foreground-service runtime rules. compileSdk is left as
          # Flutter sets it (CameraX 1.5 requires compileSdk 35+).
          sed -i 's/targetSdk = flutter.targetSdkVersion/targetSdk = 34/' android/app/build.gradle.kts || true
          sed -i 's/targetSdkVersion flutter.targetSdkVersion/targetSdkVersion 34/' android/app/build.gradle || true

      - name: Get dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: color-watch-apk
          path: build/app/outputs/flutter-apk/app-release.apk
