name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Show Flutter version
        run: flutter --version

      # Back up our custom pubspec/lib so flutter create can't overwrite them.
      - name: Back up sources
        run: |
          cp pubspec.yaml /tmp/pubspec.yaml
          cp -r lib /tmp/lib
          cp -r assets /tmp/assets

      # Generate fresh android/ scaffolding matching this Flutter version.
      - name: Create platform scaffolding
        run: flutter create --platforms=android --org com.example .

      # Restore our sources (in case flutter create touched them).
      - name: Restore sources
        run: |
          cp /tmp/pubspec.yaml pubspec.yaml
          rm -rf lib && cp -r /tmp/lib lib
          rm -rf assets && cp -r /tmp/assets assets

      # Apply custom manifest (camera + notifications + foreground service).
      - name: Apply custom manifest
        run: cp overrides/AndroidManifest.xml android/app/src/main/AndroidManifest.xml

      # Camera plugin + foreground service need minSdk 21+.
      - name: Patch SDK versions
        run: |
          # minSdk 21 → runs on Android 5+ (incl. Android 10).
          sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 21/' android/app/build.gradle.kts || true
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/' android/app/build.gradle || true
          # targetSdk 34 → runs fine on Android 16 while avoiding the stricter
          # Android 15+ foreground-service runtime rules. compileSdk is left as
          # Flutter sets it (CameraX 1.5 requires compileSdk 35+).
          sed -i 's/targetSdk = flutter.targetSdkVersion/targetSdk = 34/' android/app/build.gradle.kts || true
          sed -i 's/targetSdkVersion flutter.targetSdkVersion/targetSdkVersion 34/' android/app/build.gradle || true

      # flutter_local_notifications (v17+) needs Java 8+ core library desugaring.
      # The android/ scaffolding is generated fresh, so enable it on the
      # generated Gradle file and add the desugar_jdk_libs dependency.
      - name: Enable core library desugaring
        run: |
          KTS=android/app/build.gradle.kts
          if [ -f "$KTS" ]; then
            sed -i 's/compileOptions {/compileOptions {\n        isCoreLibraryDesugaringEnabled = true/' "$KTS"
            printf '\ndependencies {\n    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.4")\n}\n' >> "$KTS"
          fi
          GRADLE=android/app/build.gradle
          if [ -f "$GRADLE" ]; then
            sed -i 's/compileOptions {/compileOptions {\n        coreLibraryDesugaringEnabled true/' "$GRADLE"
            printf "\ndependencies {\n    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'\n}\n" >> "$GRADLE"
          fi

      - name: Get dependencies
        run: flutter pub get

      # Apply the custom launcher icon if one is provided. flutter_launcher_icons
      # overwrites the default mipmaps generated by flutter create. Skipped
      # gracefully when assets/icon.png is absent so the build still succeeds.
      - name: Generate launcher icon
        run: |
          if [ -f assets/icon.png ]; then
            dart run flutter_launcher_icons
          else
            echo "assets/icon.png not found — keeping default Flutter icon."
          fi

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: color-watch-apk
          path: build/app/outputs/flutter-apk/app-release.apk
